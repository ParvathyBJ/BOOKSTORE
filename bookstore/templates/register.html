{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-form">
        <h2 style="text-align: center; font-size: 2.2rem; margin-bottom: 5px;">Join The Shop</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 30px;">Create your personal account today.</p>
        <form method="POST">
            <label>Full Name</label>
            <input type="text" name="name" required placeholder="John Doe">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="you@example.com">
            <button type="submit" class="btn" style="width: 100%;">Register Account ✨</button>
            <p style="text-align: center; margin-top: 20px;">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: bold;">Login</a></p>
        </form>
    </div>
    <div class="auth-graphic"></div>
</div>
{% endblock %}
