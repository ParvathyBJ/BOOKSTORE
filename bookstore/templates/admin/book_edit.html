{% extends "base.html" %}
{% block content %}
<h2>Edit Book</h2>
<div class="card">
    <form method="POST" style="max-width: 100%; margin: 0; box-shadow: none;">
        <label>ISBN (Cannot be changed):</label>
        <input type="text" value="{{ book.ISBN }}" disabled>
        
        <label>Title:</label>
        <input type="text" name="title" value="{{ book.title }}" required>
        
        <label>Price:</label>
        <input type="number" step="0.01" name="price" value="{{ book.price }}" required>
        
        <label>Category:</label>
        <select name="category_id" required>
            {% for cat in categories %}
            <option value="{{ cat.category_id }}" {% if cat.category_id == book.category_id %}selected{% endif %}>{{ cat.name }}</option>
            {% endfor %}
        </select>
        
        <label>Authors (Hold Ctrl/Cmd to select multiple):</label>
        <select name="author_ids" multiple required style="height: 100px;">
            {% for auth in authors %}
            <option value="{{ auth.author_id }}" {% if auth.author_id in book_authors %}selected{% endif %}>{{ auth.name }}</option>
            {% endfor %}
        </select>
        
        <button type="submit" class="btn">Update Book</button>
        <a href="{{ url_for('admin_books') }}" class="btn" style="background-color: var(--secondary); text-decoration: none; padding: 10px 15px; border-radius: 4px; display: inline-block;">Cancel</a>
    </form>
</div>
{% endblock %}
