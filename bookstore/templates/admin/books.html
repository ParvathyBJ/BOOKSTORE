{% extends "base.html" %}
{% block content %}
<h2>Manage Books</h2>
<div class="card">
    <h3>Add New Book</h3>
    <form method="POST" style="max-width: 100%; margin: 0; box-shadow: none;">
        <input type="hidden" name="action" value="add">
        <label>ISBN:</label>
        <input type="text" name="isbn" required>
        <label>Title:</label>
        <input type="text" name="title" required>
        <label>Price:</label>
        <input type="number" step="0.01" name="price" required>
        
        <label>Category:</label>
        <select name="category_id" required>
            {% for cat in categories %}
            <option value="{{ cat.category_id }}">{{ cat.name }}</option>
            {% endfor %}
        </select>
        
        <label>Authors (Hold Ctrl/Cmd to select multiple):</label>
        <select name="author_ids" multiple required style="height: 100px;">
            {% for auth in authors %}
            <option value="{{ auth.author_id }}">{{ auth.name }}</option>
            {% endfor %}
        </select>
        
        <button type="submit" class="btn">Add Book</button>
    </form>
</div>

<div class="card">
    <h3>All Books</h3>
    <table>
        <thead>
            <tr>
                <th>ISBN</th>
                <th>Title</th>
                <th>Price</th>
                <th>Category</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for b in books %}
            <tr>
                <td>{{ b.ISBN }}</td>
                <td>{{ b.title }}</td>
                <td>₹{{ b.price }}</td>
                <td>{{ b.category_name }}</td>
                <td style="display: flex; gap: 5px;">
                    <a href="{{ url_for('admin_books_edit', isbn=b.ISBN) }}" class="btn" style="background-color: var(--primary); text-decoration: none; padding: 5px 10px; font-size: 0.9em;">Edit</a>
                    <form method="POST" style="display: inline; box-shadow: none; padding: 0;">
                        <input type="hidden" name="action" value="delete">
                        <input type="hidden" name="isbn" value="{{ b.ISBN }}">
                        <button type="submit" class="btn btn-red" style="padding: 5px 10px; font-size: 0.9em;" onclick="return confirm('Are you sure?')">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
