{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-graphic"></div>
    <div class="auth-form">
        <h2 style="text-align: center; font-size: 2.2rem; margin-bottom: 5px;">Welcome Back!</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 30px;">Please login to your account.</p>
        <form method="POST">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="you@example.com">
            <button type="submit" class="btn" style="width: 100%;">Login 🔐</button>
            <p style="text-align: center; margin-top: 20px;">Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary); font-weight: bold;">Sign Up</a></p>
        </form>
    </div>
</div>
{% endblock %}
